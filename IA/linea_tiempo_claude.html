<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evolución de la IA · 2022–2025</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    
    --surface: #0e1419;
    --line: #1a2535;
    --text: #c8d8e8;
    --muted: #4a6070;
    --openai: #10a37f;
    --anthropic: #d4651a;
    --google: #4285f4;
    --meta: #1877f2;
    --microsoft: #00bcf2;
    --mistral: #7c3aed;
    --xai: #e8e8e8;
    --other: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 60px 40px 40px;
    text-align: center;
    position: relative;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 1px; height: 60px;
    background: linear-gradient(to bottom, transparent, var(--muted));
  }
  .title-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 8vw, 96px);
    letter-spacing: 4px;
    line-height: 0.95;
    background: linear-gradient(135deg, #fff 0%, #6090b0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    margin-top: 20px;
    font-size: 14px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
  }

  /* LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 24px;
    justify-content: center;
    padding: 30px 40px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    margin: 0 40px 60px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.2s;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .legend-item:hover { color: var(--text); }
  .legend-item.active { color: var(--text); }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* TIMELINE CONTAINER */
  .timeline-wrapper {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 40px 100px;
    position: relative;
  }

  /* YEAR GROUPS */
  .year-group { margin-bottom: 80px; }
  .year-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 40px;
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 12px 0;
    background: var(--bg);
  }
  .year-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 1;
    color: #1a2535;
    letter-spacing: 4px;
    user-select: none;
  }
  .year-line {
    flex: 1;
    height: 1px;
    background: var(--line);
  }
  .year-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* EVENTS GRID */
  .events-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 2px;
  }

  /* EVENT CARD */
  .event-card {
    display: grid;
    grid-template-columns: 120px 1px 1fr;
    gap: 0 24px;
    align-items: start;
    padding: 20px 0;
    cursor: pointer;
    transition: all 0.25s;
    opacity: 1;
  }
  .event-card.hidden { display: none; }
  .event-card:hover .event-content { transform: translateX(4px); }

  .event-date {
    text-align: right;
    padding-top: 4px;
  }
  .event-month {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    display: block;
  }
  .event-day {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    line-height: 1;
    color: #2a3a4a;
  }

  .event-spine {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .event-spine::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: var(--line);
  }
  .event-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid var(--bg);
    position: relative;
    z-index: 1;
    margin-top: 6px;
    flex-shrink: 0;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .event-card:hover .event-dot {
    transform: scale(1.5);
    box-shadow: 0 0 12px currentColor;
  }

  .event-content {
    padding-bottom: 20px;
    transition: transform 0.25s;
  }
  .event-company {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .company-badge {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
  }
  .event-title {
    font-size: 17px;
    font-weight: 600;
    color: #e0eaf4;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .event-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    font-weight: 300;
    max-width: 600px;
  }
  .event-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    border-radius: 2px;
    background: var(--line);
    color: var(--muted);
    text-transform: uppercase;
  }

  /* MILESTONE */
  .event-card.milestone .event-title { color: #fff; }
  .event-card.milestone .event-content {
    background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, transparent 100%);
    border-left: 2px solid;
    padding-left: 16px;
    border-radius: 0 4px 4px 0;
  }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    header { padding: 40px 20px 30px; }
    .legend { margin: 0 20px 40px; }
    .timeline-wrapper { padding: 0 20px 80px; }
    .event-card { grid-template-columns: 80px 1px 1fr; gap: 0 16px; }
    .event-day { font-size: 24px; }
    .year-number { font-size: 52px; }
  }

  /* FADE IN */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .event-card { animation: fadeUp 0.4s ease both; }
</style>
</head>

const companyColors = {
  openai:'#10a37f', anthropic:'#d4651a', google:'#4285f4',
  meta:'#1877f2', microsoft:'#00bcf2', mistral:'#7c3aed',
  xai:'#e0e0e0', other:'#f59e0b'
};
const companyNames = {
  openai:'OPENAI', anthropic:'ANTHROPIC', google:'GOOGLE / DEEPMIND',
  meta:'META', microsoft:'MICROSOFT', mistral:'MISTRAL AI',
  xai:'xAI', other:'OTROS'
};

let activeFilter = 'all';

function filter(company) {
  activeFilter = company;
  document.querySelectorAll('.legend-item').forEach(el => {
    el.classList.toggle('active', el.dataset.company === company);
  });
  document.querySelectorAll('.event-card').forEach(el => {
    el.classList.toggle('hidden', company !== 'all' && el.dataset.company !== company);
  });
  // Update counts
  document.querySelectorAll('.year-group').forEach(group => {
    const visible = group.querySelectorAll('.event-card:not(.hidden)').length;
    const countEl = group.querySelector('.year-count');
    if (countEl) countEl.textContent = visible + ' evento' + (visible !== 1 ? 's' : '');
  });
}

function buildTimeline() {
  const years = [...new Set(events.map(e => e.year))].sort();
  const container = document.getElementById('timeline');

  years.forEach(year => {
    const yearEvents = events.filter(e => e.year === year);
    const group = document.createElement('div');
    group.className = 'year-group';

    // Year header
    const header = document.createElement('div');
    header.className = 'year-header';
    header.innerHTML = `
      <div class="year-number">${year}</div>
      <div class="year-line"></div>
      <div class="year-count">${yearEvents.length} eventos</div>
    `;
    group.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'events-grid';

    yearEvents.forEach((ev, idx) => {
      const card = document.createElement('div');
      card.className = 'event-card' + (ev.milestone ? ' milestone' : '');
      card.dataset.company = ev.company;
      card.style.animationDelay = (idx * 0.05) + 's';
      if (ev.milestone) {
        card.querySelector?.('.event-content')?.style;
      }

      const color = companyColors[ev.color] || '#4a6070';
      const tags = ev.tags.map(t => `<span class="tag">${t}</span>`).join('');

      card.innerHTML = `
        <div class="event-date">
          <span class="event-month">${ev.month}</span>
          <div class="event-day">${ev.day || ''}</div>
        </div>
        <div class="event-spine">
          <div class="event-dot" style="background:${color}; color:${color}; border-color:var(--bg)"></div>
        </div>
        <div class="event-content" ${ev.milestone ? `style="border-color:${color}"` : ''}>
          <div class="event-company" style="color:${color}">
            <span class="company-badge" style="background:${color}"></span>
            ${companyNames[ev.company] || ev.company}
          </div>
          <div class="event-title">${ev.title}</div>
          <div class="event-desc">${ev.desc}</div>
          <div class="event-tags">${tags}</div>
        </div>
      `;

      grid.appendChild(card);
    });

    group.appendChild(grid);
    container.appendChild(group);
  });
}

buildTimeline();
